{% extends "base.html" %}

{% block content %}

<style>
    .delete-container {
        max-width: 520px;
        margin: 80px auto;
        background: #ffffff;
        padding: 40px 35px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        text-align: center;
        border: 1px solid #eee;
        animation: fadeIn 0.4s ease;
    }

    .delete-container h2 {
        font-size: 26px;
        margin-bottom: 15px;
        color: #b85c38;
        font-weight: 700;
    }

    .delete-container p {
        font-size: 15px;
        color: #666;
        margin-bottom: 25px;
    }

    .delete-container strong {
        color: #000;
    }

    .delete-actions {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
    }

    .btn-delete {
        background: linear-gradient(135deg, #ff4d4d, #b30000);
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: 0.3s;
        box-shadow: 0 5px 15px rgba(255, 0, 0, 0.25);
    }

    .btn-delete:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(255, 0, 0, 0.35);
    }

    .btn-cancel {
        display: inline-block;
        padding: 11px 22px;
        border-radius: 30px;
        border: 1.5px solid #ddd;
        text-decoration: none;
        color: #555;
        font-size: 14px;
        transition: 0.3s;
    }

    .btn-cancel:hover {
        border-color: #c9a84c;
        color: #c9a84c;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="delete-container">

    <h2><i class="fas fa-exclamation-triangle"></i> Delete Party</h2>

    <p>
        Are you sure you want to delete
        <strong>{{ party.name }}</strong>?
    </p>

    <form method="POST">
        {% csrf_token %}

        <div class="delete-actions">
            <button type="submit" class="btn-delete">
                <i class="fas fa-trash"></i> Yes, Delete
            </button>

            <a href="/" class="btn-cancel">
                Cancel
            </a>
        </div>
    </form>

</div>

{% endblock %}
